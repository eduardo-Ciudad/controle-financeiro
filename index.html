<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle Financeiro</title>
  <link rel="stylesheet" href="frontend/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
          <path d="M12 6v6l4 2"/>
        </svg>
        <span>Controle Financeiro</span>
      </div>
      <div class="header-right">
        <button class="btn-theme-toggle" id="btnThemeToggle" title="Alternar tema" aria-label="Alternar tema">
          <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <div class="header-date" id="headerDate"></div>
      </div>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <main class="main">

    <!-- ROW 1: Saldo + Formulário -->
    <section class="top-row">

      <!-- SALDO CARD -->
      <div class="card saldo-card">
        <div class="saldo-label">Saldo Disponível</div>
        <div class="saldo-value" id="saldoValue">
          <span class="saldo-currency">R$</span>
          <span id="saldoNumero">—</span>
        </div>
        <div class="saldo-hint">Atualizado em tempo real</div>
        <div class="saldo-edit">
          <input type="number" id="inputSaldoNovo" placeholder="Definir novo saldo..." step="0.01" />
          <button class="btn-saldo-update" id="btnAtualizarSaldo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Atualizar
          </button>
        </div>
        <div id="saldoFeedback" class="saldo-feedback"></div>
        <div class="saldo-decoration"></div>
      </div>

      <!-- FORM CARD -->
      <div class="card form-card">
        <h2 class="card-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
          Nova Conta
        </h2>
        <form id="formConta" novalidate>
          <div class="field-group">
            <label for="inputNome">Nome da Conta</label>
            <input type="text" id="inputNome" placeholder="Ex: Aluguel, Internet..." autocomplete="off" />
            <span class="field-error" id="erroNome"></span>
          </div>
          <div class="field-row">
            <div class="field-group">
              <label for="inputValor">Valor (R$)</label>
              <input type="number" id="inputValor" placeholder="0,00" min="0.01" step="0.01" />
              <span class="field-error" id="erroValor"></span>
            </div>
            <div class="field-group">
              <label for="inputData">Vencimento</label>
              <input type="date" id="inputData" />
              <span class="field-error" id="erroData"></span>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="btnAdicionar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Adicionar Conta
          </button>
        </form>
        <div id="formFeedback" class="form-feedback"></div>
      </div>

    </section>

    <!-- ROW 2: Resumo rápido -->
    <section class="summary-row">
      <div class="summary-chip pending">
        <span class="summary-chip-label">Pendente</span>
        <span class="summary-chip-value" id="totalPendente">R$ —</span>
      </div>
      <div class="summary-chip paid">
        <span class="summary-chip-label">Pago</span>
        <span class="summary-chip-value" id="totalPago">R$ —</span>
      </div>
      <div class="summary-chip total">
        <span class="summary-chip-label">Total de Contas</span>
        <span class="summary-chip-value" id="totalContas">—</span>
      </div>
    </section>

    <!-- ROW 3: Lista de Contas -->
    <section class="card list-card">
      <div class="list-header">
        <h2 class="card-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="8" y1="6" x2="21" y2="6"/>
            <line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/>
            <line x1="3" y1="12" x2="3.01" y2="12"/>
            <line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
          Contas
        </h2>
        <div class="list-filter">
          <button class="filter-btn active" data-filter="todas">Todas</button>
          <button class="filter-btn" data-filter="pendente">Pendentes</button>
          <button class="filter-btn" data-filter="pago">Pagas</button>
        </div>
      </div>

      <div id="listaContas" class="lista-contas">
        <div class="empty-state" id="emptyState">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="9" y1="9" x2="15" y2="9"/>
            <line x1="9" y1="15" x2="12" y2="15"/>
          </svg>
          <p>Nenhuma conta encontrada.</p>
        </div>
      </div>
    </section>

    <!-- ROW 4: Gráficos -->
    <section class="charts-row">
      <div class="card chart-card">
        <h2 class="card-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 2a10 10 0 0 1 10 10H12V2z"/>
          </svg>
          Distribuição
        </h2>
        <div class="chart-container pie-container">
          <canvas id="chartPizza"></canvas>
        </div>
        <div class="chart-legend" id="legendPizza"></div>
      </div>

      <div class="card chart-card">
        <h2 class="card-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="12" width="4" height="9"/>
            <rect x="10" y="7" width="4" height="14"/>
            <rect x="17" y="4" width="4" height="17"/>
            <line x1="2" y1="21" x2="22" y2="21"/>
          </svg>
          Valores por Conta
        </h2>
        <div class="chart-container bar-container">
          <canvas id="chartBarras"></canvas>
        </div>
      </div>
    </section>

  </main>

  <!-- TOAST NOTIFICATION -->
  <div id="toast" class="toast"></div>

  <!-- LOADING OVERLAY -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <script src="frontend/script.js"></script>
</body>
</html>
